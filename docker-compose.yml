services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pradeep-portfolio
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      RESEND_API_KEY: "${RESEND_API_KEY}"
    restart: unless-stopped
